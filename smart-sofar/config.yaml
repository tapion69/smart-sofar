name: "Smart Sofar Node-RED"
version: "0.1.0"
slug: smart_sofar
description: "Node-RED Sofar Solar bridge to MQTT (minimal serial version)"

arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386

startup: services
boot: auto
init: false
uart: true
homeassistant_api: true

map:
  - type: addon_config
    read_only: false

ports:
  1892/tcp: 1892

panel_icon: mdi:solar-power

options:
  serial_port: "/dev/serial/by-id/CHANGE-ME"
  modbus_slave_id: 1
  modbus_baudrate: 9600

  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
  mqtt_prefix: "sofar"

  timezone_mode: "Europe/Paris"
  timezone_custom: "UTC"

schema:
  serial_port: str
  modbus_slave_id: int(1,247)
  modbus_baudrate: list(9600|19200|38400|57600|115200)

  mqtt_host: str
  mqtt_port: int(1,65535)
  mqtt_user: str?
  mqtt_pass: password?
  mqtt_prefix: str?

  timezone_mode: list(Europe/Paris|Europe/Berlin|Europe/Brussels|Europe/Madrid|Europe/Rome|Europe/London|America/New_York|America/Chicago|America/Los_Angeles|America/Montreal|Asia/Dubai|Asia/Tokyo|Australia/Sydney|CUSTOM)
  timezone_custom: str?
